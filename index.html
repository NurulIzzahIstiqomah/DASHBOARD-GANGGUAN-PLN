<!DOCTYPE html>
<html lang="id">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Dashboard Monitoring Gangguan PLN</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <link rel="stylesheet"
        href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <link rel="stylesheet"
        href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />

    <link rel="stylesheet"
        href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />

    <link rel="stylesheet" href="style.css">

</head>

<!-- Modal Foto -->
<div class="modal fade" id="fotoModal" tabindex="-1">

    <div class="modal-dialog modal-xl modal-dialog-centered">

        <div class="modal-content bg-dark">

            <div class="modal-header">

                <h5 class="modal-title text-white">
                    Foto Gangguan
                </h5>

                <button
                    type="button"
                    class="btn-close btn-close-white"
                    data-bs-dismiss="modal">
                </button>

            </div>

            <div class="modal-body text-center">

                <img
                    id="fotoBesar"
                    src=""
                    style="width:100%; max-height:80vh; object-fit:contain;">

            </div>

        </div>

    </div>

</div>

<body>

<div class="container-fluid py-3">

    <!-- HEADER -->
    <div class="row mb-3">

        <div class="col-12">

            <div class="topbar">

                <h3 class="mb-0">
                    ⚡ Dashboard Monitoring Gangguan PLN
                </h3>

            </div>

        </div>

    </div>

    <!-- KPI -->
    <div class="row g-3 mb-3">

        <div class="col-lg-3 col-md-6">

            <div class="card-dashboard">

                <h2 id="totalGangguan">0</h2>

                <p>Total Gangguan</p>

            </div>

        </div>

        <div class="col-lg-3 col-md-6">

            <div class="card-dashboard green">

                <h2 id="sudahTL">0</h2>

                <p>Sudah Tindak Lanjut</p>

            </div>

        </div>

        <div class="col-lg-3 col-md-6">

            <div class="card-dashboard orange">

                <h2 id="belumTL">0</h2>

                <p>Belum Tindak Lanjut</p>

            </div>

        </div>

        <div class="col-lg-3 col-md-6">

            <div class="card-dashboard purple">

                <h2 id="totalENS">0</h2>

                <p>Total ENS (kWh)</p>

            </div>

        </div>

    </div>

    <!-- ISI -->
    <div class="row g-3">

        <!-- FILTER -->
        <div class="col-lg-2">

            <div class="panel">

                <h5 class="mb-3">
                    <i class="bi bi-funnel-fill"></i>
                    Filter
                </h5>

                <select id="filterUP3" class="form-select mb-3">
                    <option value="">Semua UP3</option>
                </select>

                <select id="filterULP" class="form-select mb-3">
                    <option value="">Semua ULP</option>
                </select>

                <select id="filterStatus" class="form-select">
                    <option value="">Semua Status</option>
                </select>

            </div>

        </div>

        <!-- PETA -->
        <div class="col-lg-7">

            <div id="map"></div>

        </div>

        <!-- DETAIL -->
        <div class="col-lg-3">

            <div class="panel">

                <h5 class="mb-3">
                    <i class="bi bi-info-circle-fill"></i>
                    Detail Gangguan
                </h5>

                <div id="detail">

                    <div class="text-center mt-5">

                        <i class="bi bi-geo-alt-fill fs-1 text-secondary"></i>

                        <p class="mt-3">

                            Klik marker pada peta untuk melihat detail gangguan.

                        </p>

                    </div>

                </div>

            </div>

        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>

<script src="script.js"></script>

</body>
</html>
